<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรักการอ่าน | โรงเรียนเตรียมอุดมศึกษาพัฒนาการ ปทุมธานี</title>
    <link rel="icon" type="image/png" href="school_logo_round.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    
    <section class="hero-section">
        <!-- Background Overlay -->
        <div class="hero-overlay"></div>
        
        <!-- Particles container -->
        <div class="particles-container" id="particles"></div>

        <!-- Main Content -->
        <div class="hero-content">
            <img src="school_logo_round.png" 
                 alt="โลโก้โรงเรียน" 
                 class="school-logo animate-fade-in animate-float">
            
            <h1 class="title-main animate-slide-up delay-100">บันทึกรักการอ่าน</h1>
            <h2 class="title-sub animate-slide-up delay-200">กลุ่มสาระการเรียนรู้ภาษาไทย</h2>
            <h3 class="title-school animate-slide-up delay-300">โรงเรียนเตรียมอุดมศึกษาพัฒนาการ ปทุมธานี</h3>
            
            <div class="mt-4 animate-slide-up delay-400">
                <a href="login.html" class="btn-enter animate-pulse">คลิกเพื่อเข้าสู่ระบบ</a>
            </div>
        </div>

        <footer class="site-footer">
            สร้างระบบโดย นายณัฐภัทร บัวราช มัธยมศึกษาปีที่ 5/5
        </footer>
    </section>

    <!-- JavaScript for Particles Effect -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size, position, and animation duration
                const size = Math.random() * 8 + 4; // 4px to 12px
                const posX = Math.random() * 100; // 0% to 100%
                const delay = Math.random() * 5; // 0s to 5s
                const duration = Math.random() * 10 + 10; // 10s to 20s

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;

                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
